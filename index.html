<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenido cambio de CI</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f5f0eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .tarjeta {
      background: white;
      padding: 60px 50px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 480px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      color: #222;
      margin-bottom: 16px;
    }

    p {
      color: #666;
      line-height: 1.7;
      margin-bottom: 12px;
      font-size: 1rem;
    }

    .firma {
      margin-top: 40px;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="tarjeta">
    <h1>Bienvenido Hola Inge, prueba 2</h1>
    <p>Esta es mi primera aplicación web desplegada en <strong>Microsoft Azure</strong>.</p>
    <p>Cada vez que hago un <em>push</em> al repositorio, la página se actualiza automáticamente.</p>
    <div class="firma">
      Desarrollado por Xavier Reyes
    </div>
  </div>
</body>
</html>
